---
layout: default
---

<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: site.minima.date_format | default: "%b %-d, %Y" }}
      </time>
      {%- if page.author -%}
        <span itemprop="author" itemscope itemtype="http://schema.org/Person">
          <span class="p-author h-card" itemprop="name">{{ page.author }}</span>
        </span>
      {%- endif -%}
    </p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  {%- if page.comments != false and site.utterances.repo -%}
    <section class="post-comments" aria-labelledby="comments-title">
      <h2 id="comments-title">Comments</h2>
      <script
        src="https://utteranc.es/client.js"
        repo="{{ site.utterances.repo }}"
        issue-term="{{ site.utterances.issue_term | default: 'pathname' }}"
        theme="{{ site.utterances.theme | default: 'github-light' }}"
        crossorigin="anonymous"
        async>
      </script>
      <noscript>Enable JavaScript to load comments.</noscript>
    </section>
  {%- endif -%}

  <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
</article>
