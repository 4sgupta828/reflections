<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f7f8;
      --paper: #ffffff;
      --ink: #16181d;
      --ink2: #2a2f38;
      --ink3: #5f6876;
      --line: #e5e7eb;
      --accent: #0f766e;
      --accent-soft: #ecfeff;
      --accent-strong: #115e59;
      --shadow: 0 1px 2px rgba(22, 24, 29, 0.04);
      --radius: 12px;
      --content-width: 760px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink2);
      font-family: "Inter", sans-serif;
      line-height: 1.65;
    }

    a {
      color: var(--accent-strong);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .site-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .site-header {
      padding: 20px 0 0;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }

    .site-header .wrap,
    .footer-grid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-mark {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .brand-tagline {
      color: var(--ink3);
      font-size: 0.9rem;
      max-width: 38rem;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .site-nav a {
      padding: 8px 0;
      border-radius: 0;
      color: var(--ink2);
    }

    .site-nav a:hover {
      background: transparent;
      color: var(--accent-strong);
    }

    .page-main {
      flex: 1;
      padding: 28px 0 56px;
    }

    .surface {
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
    }

    .page-shell {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(24px, 4vw, 40px);
    }

    .content-narrow {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .page-title,
    .post-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0 0 10px;
      color: var(--ink);
    }

    .page-intro,
    .post-intro,
    .post-meta,
    .page-meta {
      color: var(--ink3);
      font-size: 1rem;
    }

    .post-meta,
    .page-meta {
      margin-bottom: 14px;
    }

    .social-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0;
    }

    .icon-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .icon-link:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      text-decoration: none;
      transform: translateY(-1px);
    }

    .icon-link svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .post-content,
    .page-content {
      font-size: 1rem;
      color: var(--ink2);
    }

    .post-content > *:first-child,
    .page-content > *:first-child {
      margin-top: 0;
    }

    .post-content h2,
    .page-content h2,
    .post-content h3,
    .page-content h3 {
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: var(--ink);
    }

    .post-content h2,
    .page-content h2 {
      font-size: 1.45rem;
    }

    .post-content h3,
    .page-content h3 {
      font-size: 1.15rem;
    }

    .post-content p,
    .page-content p,
    .post-content ul,
    .page-content ul,
    .post-content ol,
    .page-content ol,
    .post-content blockquote,
    .page-content blockquote {
      margin-bottom: 1rem;
    }

    .post-content blockquote,
    .page-content blockquote {
      margin-left: 0;
      padding: 12px 18px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 0 12px 12px 0;
    }

    .page-header,
    .post-header {
      margin-bottom: 22px;
    }

    .post-actions-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .post-header-row,
    .post-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .post-body {
      padding: 0;
    }

    .post-list {
      list-style: none;
      padding: 0;
      margin: 28px 0 0;
      display: grid;
      gap: 18px;
    }

    .post-card {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
    }

    .post-card h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }

    .post-card time {
      color: var(--ink3);
      font-size: 0.85rem;
      font-family: "JetBrains Mono", monospace;
    }

    .post-card p {
      margin: 10px 0 0;
      color: var(--ink3);
    }

    .post-comments {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .site-footer {
      padding: 0 0 28px;
    }

    .footer-grid {
      padding: 16px 0 0;
      border-top: 1px solid var(--line);
    }

    .footer-note {
      color: var(--ink3);
      max-width: 42rem;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .site-header {
        padding-top: 16px;
      }

      .wrap {
        width: min(100%, calc(100% - 20px));
      }

      .surface {
        padding: 0;
      }

      .page-shell {
        padding: 20px 16px;
        border-radius: 10px;
      }

      .site-nav a {
        padding: 6px 0;
      }

      .site-header .wrap,
      .footer-grid,
      .post-actions {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="wrap">
        <div class="brand">
          <a class="brand-mark" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <div class="brand-tagline">{{ site.tagline }}</div>
        </div>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Blog</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          {% include follow_links.html %}
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="wrap">
        <div class="surface">
          <div class="page-shell">
            {{ content }}
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrap footer-grid">
        <div class="footer-note">
          Thoughtful notes on agentic system design, production AI systems, and the engineering work required to make non-deterministic software reliable.
        </div>
        {% include follow_links.html %}
      </div>
    </footer>
  </div>
</body>
</html>
